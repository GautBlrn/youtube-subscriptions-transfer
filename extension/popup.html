<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="styles.css" />
    <style>
      body { width: 340px; }
      .body { padding: 16px; display: flex; flex-direction: column; gap: 12px; }
    </style>
  </head>
  <body>
    <div class="header">
      <span class="logo">
        <svg width="16" height="12" viewBox="0 0 16 12" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M6.3 3.2v5.6L10.8 6 6.3 3.2Z" fill="#fff"/>
        </svg>
      </span>
      <div>
        <h1>Subscriptions Transfer</h1>
        <p>Move your subs between accounts</p>
      </div>
    </div>

    <div class="body">
      <div class="card">
        <h2><span class="step-num">1</span>Export (source account)</h2>
        <p class="sub">
          Logged in with the account to copy <em>from</em>? Download its
          subscriptions as a CSV.
        </p>
        <button id="export">Export my subscriptions</button>
        <div id="exportStatus" class="status"></div>
      </div>

      <div class="card">
        <h2><span class="step-num">2</span>Import (destination account)</h2>
        <p class="sub">
          Opens in a full tab, so a file picker won't close this popup.
        </p>
        <button id="openImport" class="secondary">Open import page</button>
      </div>
    </div>

    <script src="common.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
